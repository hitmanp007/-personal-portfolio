<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resume</title>
</head>
<body>
    <h1>My Resume</h1>

    <!-- Embed the PDF -->
    <embed src="{{ url_for('static', filename='resume/resume.pdf') }}" 
        type="application/pdf" width="100%" height="700px">

    <!-- Add a download button -->
    <p>
        <a href="{{ url_for('static', filename='resume/resume.pdf') }}" download="Pranav_Resume.pdf" class="download-btn">
        Download Resume
        </a>
    </p>
    <style>.download-btn {
    background-color: #1e90ff;   /* blue */
    color: white;
    padding: 12px 24px;
    border: 2px solid #1e90ff;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s ease;
}

.download-btn:hover {
    background-color: white;
    color: #1e90ff;
}
</style>
</body>
</html>
