<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .skill-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .skill-box h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tags span {
            padding: 8px 14px;
            background: #f0f2f5;
            border-radius: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .skill-tags span:hover {
            background: #007bff;
            color: white;
        }
    </style>
</body>

</html>

<!-- Skills Section -->
<section id="skills" class="section bg-light">
    <div class="container">
        <h2 class="section-title">Technical Skills</h2>

        <div class="skills-grid">

            <!-- Programming -->
            <div class="skill-box">
                <h3>Programming</h3>
                <div class="skill-tags">
                    <span>Python</span>
                    <span>SQL</span>
                    <span>JavaScript</span>
                    <span>C</span>
                </div>
            </div>

            <!-- Data Science -->
            <div class="skill-box">
                <h3>Data Science</h3>
                <div class="skill-tags">
                    <span>NumPy</span>
                    <span>Pandas</span>
                    <span>Data Analysis</span>
                    <span>Statistical Analysis</span>
                    <span>Data Visualization</span>
                </div>
            </div>

            <!-- Machine Learning -->
            <div class="skill-box">
                <h3>Machine Learning</h3>
                <div class="skill-tags">
                    <span>Scikit-learn</span>
                    <span>Model Evaluation</span>
                    <span>Feature Engineering</span>
                    <span>Data Preprocessing</span>
                </div>
            </div>

            <!-- Tools -->
            <div class="skill-box">
                <h3>Tools & Technologies</h3>
                <div class="skill-tags">
                    <span>Git</span>
                    <span>GitHub</span>
                    <span>Jupyter Notebook</span>
                    <span>VS Code</span>
                    <span>Linux</span>
                </div>
            </div>

        </div>
    </div>
</section>
